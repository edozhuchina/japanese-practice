<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 日语口语练习</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 320px; }
        input { width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; }
        button { width: 100%; padding: 12px; background: #ff6b6b; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:disabled { background: #ccc; }
        .msg { text-align: center; font-size: 14px; margin-top: 10px; min-height: 20px; }
        .error { color: #e74c3c; }
        .success { color: #2ecc71; }
        .link { text-align: center; margin-top: 15px; font-size: 14px; }
        .link a { color: #ff6b6b; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="text-align: center; margin-bottom: 20px;">🌸 欢迎回来</h2>
        <input type="text" id="username" placeholder="用户名" required>
        <input type="password" id="password" placeholder="密码" required>
        <button id="loginBtn" onclick="doLogin()">登 录</button>
        <p id="msg" class="msg"></p>
        <div class="link">还没有账号？<a href="register.html">立即注册</a></div>
    </div>

    <!-- 引入我们刚才写的核心 JS -->
    <script src="js/auth.js"></script>
    <script>
        async function doLogin() {
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('msg');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                msg.className = 'msg error';
                msg.textContent = '请输入用户名和密码';
                return;
            }

            btn.disabled = true;
            btn.textContent = '登录中...';

            const result = await handleLogin(username, password);

            if (result.success) {
                msg.className = 'msg success';
                msg.textContent = result.message;
                setTimeout(() => { window.location.href = 'index.html'; }, 1000); // 1秒后跳转首页
            } else {
                msg.className = 'msg error';
                msg.textContent = result.message;
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        }
    </script>
</body>
</html>
